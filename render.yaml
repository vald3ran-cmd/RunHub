services:
  - type: web
    name: runhub-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/plans
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DB_NAME
        value: runhub
      # Copia gli altri env secrets manualmente dalla Dashboard Render
      # (NON committare chiavi in git!):
      # - MONGO_URL
      # - JWT_SECRET
      # - EMERGENT_LLM_KEY
      # - STRIPE_API_KEY
      # - STRIPE_WEBHOOK_SECRET
      # - RESEND_API_KEY
      # - EMAIL_FROM
      # - APP_NAME
      # - GOOGLE_IOS_CLIENT_ID
      # - GOOGLE_WEB_CLIENT_ID
      # - GOOGLE_WEB_CLIENT_SECRET
      # - APPLE_BUNDLE_ID
